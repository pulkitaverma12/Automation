name: Selenium Automation Tests

on:
  workflow_dispatch:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install --upgrade selenium==4.46.0 webdriver-manager
          echo "--- pip show selenium ---"
          python -m pip show selenium || true
          echo "--- pip list (first 200 lines) ---"
          python -m pip list | sed -n '1,200p'

      - name: Verify environment
        run: |
          python -V
          which python || true
          python -m pip --version
          echo "--- pytest version ---"
          python -m pytest --version || true
          echo "--- Google Chrome ---"
          which google-chrome || true
          google-chrome --version || true
          echo "--- pip packages summary ---"
          python -m pip show pytest-html || true
          python -m pip show selenium || true
          python -m pip freeze | sed -n '1,200p'

      - name: Run Selenium Tests
        run: |
          python -m pytest -v

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Screenshots
          path: screenshots/

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Reports
          path: reports/
name: Selenium Automation Tests

on:
  workflow_dispatch:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          which chromium-browser || true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip show selenium || python -m pip install selenium
          python -m pip list

      - name: Verify pytest-html
        run: |
          pytest --version
          pip show pytest-html

      - name: Run Selenium Tests
        run: |
          pytest -v

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Screenshots
          path: screenshots/

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Reports
          path: reports/